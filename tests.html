<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeChart UI Tests</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { overflow: auto; }
      .test-wrap { padding: 12px; }
      .test-summary { font-family: JetBrains Mono, monospace; font-size: 12px; margin-bottom: 8px; }
      .test-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .test-table th, .test-table td { padding: 4px 6px; border-bottom: 1px solid #2d3642; }
      .pass { color: #3fb950; }
      .fail { color: #f85149; }
    </style>
  </head>
  <body>
    <div class="test-wrap">
      <div class="test-summary" id="summary">Running tests…</div>
      <table class="test-table" id="report">
        <thead>
          <tr>
            <th>Test</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <main class="app">
      <section class="layout">
        <div class="rail">
          <div class="rows" id="categoryRow"></div>
          <div class="rows" id="rows"></div>
          <div class="inputs" id="inputs"></div>
        </div>
        <div class="panel">
          <div class="panel-body" id="panelBody"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script src="tests.js"></script>
  </body>
</html>
